[project]
name = "hook-bridge"
version = "0.1.0"
description = "The hook-bridge runner: translates a Harness's native hook protocol to and from the generic Contract, running each Hook as a subprocess."
readme = "README.md"
requires-python = ">=3.12"
# Dependency-free by design (#7: no runner-to-SDK dependency) - the runner
# deals in plain wire-shaped JSON dicts, never the SDK's typed Context/Verdict.
dependencies = []

[project.scripts]
hook-bridge = "hook_bridge_runner.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hook_bridge_runner"]
