name: Publish hook-bridge-runner to PyPI

# Trusted Publishing (OIDC) - no PyPI API token stored in the repo.
# Matches the trusted publisher configured on the hook-bridge-runner PyPI
# project for this repo, this workflow file, and the pypi-runner environment.
on:
  push:
    tags:
      - "hook-bridge-runner-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-runner
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - run: uv build --package hook-bridge-runner -o dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  bump-tap:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout hook-bridge
        uses: actions/checkout@v7

      - name: Render formula
        # scripts/render_homebrew_formula.py regenerates the whole formula
        # (not just a version/sha256 patch) so template-wide changes ride
        # along automatically. Its own retry loop absorbs PyPI indexing lag
        # right after the publish job above.
        run: python3 scripts/render_homebrew_formula.py > formula.rb

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('packages/hook-bridge/pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v7
        with:
          repository: jamessawle/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}

      - name: Open PR against homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "hook-bridge-bot"
          git config user.email "actions@github.com"

          cp ../formula.rb Formula/hook-bridge-runner.rb
          if [ -z "$(git status --porcelain -- Formula/hook-bridge-runner.rb)" ]; then
            echo "formula unchanged, nothing to do"
            exit 0
          fi

          branch="bump-hook-bridge-runner-$VERSION"
          git checkout -b "$branch"
          git add Formula/hook-bridge-runner.rb
          git commit -m "hook-bridge-runner $VERSION"
          git push origin "$branch"
          gh pr create --repo jamessawle/homebrew-tap \
            --title "hook-bridge-runner $VERSION" \
            --body "Automated bump from jamessawle/hook-bridge, generated by scripts/render_homebrew_formula.py." \
            --head "$branch" --base main
